version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: temporal_network_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-temporal_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-temporal_password}
      POSTGRES_DB: ${POSTGRES_DB:-temporal_network}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-temporal_user} -d ${POSTGRES_DB:-temporal_network}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: temporal_network_api
    restart: unless-stopped
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-temporal_user}:${POSTGRES_PASSWORD:-temporal_password}@db:5432/${POSTGRES_DB:-temporal_network}
      - ENVIRONMENT=production
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ../temporal-network01
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: temporal_network_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - api
    environment:
      NODE_ENV: production

volumes:
  postgres_data:
